apply plugin: 'com.android.application'

android {
    namespace "com.nextpos.app"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.nextpos.app"
        minSdk rootProject.ext.minSdkVersion
        targetSdk rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Standard aapt options
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    androidResources {
        noCompress 'png'
    }
}

repositories {
    flatDir {
        dirs 'libs'
    }
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    implementation "androidx.appcompat:appcompat:$rootProject.ext.appcompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$rootProject.ext.coordinatorLayoutVersion"
    implementation "androidx.core:core:$rootProject.ext.coreVersion"
    
    // Connect to capacitor projects with safety checks
    if (findProject(':capacitor-android')) {
        implementation project(':capacitor-android')
    }
    
    implementation project(':app')
    
    // Auto-implementation of plugins if they exist
    [
        ':capacitor-mlkit-barcode-scanning',
        ':capacitor-app',
        ':capacitor-haptics',
        ':capacitor-keyboard',
        ':capacitor-status-bar',
        ':capacitor-cordova-android-plugins'
    ].each { plugin ->
        if (findProject(plugin)) {
            implementation project(plugin)
        }
    }

    testImplementation "junit:junit:$rootProject.ext.junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$rootProject.ext.androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$rootProject.ext.espressoCoreVersion"
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}

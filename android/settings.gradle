include ':app'

def capacitorAndroidPath = '../node_modules/@capacitor/android/capacitor'
def capacitorAndroidDir = new File(rootProject.projectDir, capacitorAndroidPath)
if (capacitorAndroidDir.exists()) {
    include ':capacitor-android'
    project(':capacitor-android').projectDir = capacitorAndroidDir
} else {
    println "Warning: :capacitor-android not found at ${capacitorAndroidDir.absolutePath}"
}

def cordovaPluginsDir = new File(rootProject.projectDir, 'capacitor-cordova-android-plugins')
if (cordovaPluginsDir.exists()) {
    include ':capacitor-cordova-android-plugins'
    project(':capacitor-cordova-android-plugins').projectDir = cordovaPluginsDir
}
